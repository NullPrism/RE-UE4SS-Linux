name: Native Linux

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-tests:
    name: CMake / clang / ctest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UEPSEUDO_PAT || github.token }}

      - name: Apply downstream UEPseudo patches
        run: ./tools/ci/apply-uepseudo-patches.sh

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-20 lld-20 llvm-20 ninja-build file binutils gzip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: |
          cmake -S . -B build_linux_ci -G Ninja \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_BUILD_TYPE=Game__Shipping__Linux \
            -DUE4SS_GUI=OFF \
            -DUE4SS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build_linux_ci --parallel 2

      - name: Check unresolved dynamic symbols
        run: |
          output="$(ldd -r build_linux_ci/Game__Shipping__Linux/lib/libUE4SS.so 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'undefined symbol' <<<"$output"; then
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build_linux_ci --output-on-failure

      - name: Package Linux runtime
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_version="ci-${GITHUB_SHA::12}"
          output_dir="${GITHUB_WORKSPACE}/dist/linux-runtime"
          loader="${GITHUB_WORKSPACE}/build_linux_ci/Game__Shipping__Linux/lib/libUE4SS.so"

          tools/release/package-linux-runtime.sh \
            --loader "${loader}" \
            --version "${package_version}" \
            --output-dir "${output_dir}" \
            --source-commit "${GITHUB_SHA}" \
            --loader-source-commit "${GITHUB_SHA}"

          printf 'package_version=%s\n' \
            "${package_version}" \
            >> "${GITHUB_OUTPUT}"

          printf 'output_dir=%s\n' \
            "${output_dir}" \
            >> "${GITHUB_OUTPUT}"

      - name: Verify Linux runtime package
        shell: bash
        run: |
          set -euo pipefail

          package_version="${{ steps.package.outputs.package_version }}"
          output_dir="${{ steps.package.outputs.output_dir }}"

          tools/ci/verify-linux-runtime-package.sh \
            "${output_dir}/RE-UE4SS-Linux-${package_version}-x86_64.tar.gz" \
            "${output_dir}/RE-UE4SS-Linux-${package_version}-x86_64-debug.tar.gz"

      - name: Upload Linux runtime packages
        uses: actions/upload-artifact@v6
        with:
          name: RE-UE4SS-Linux-x86_64-${{ github.sha }}
          path: |
            ${{ steps.package.outputs.output_dir }}/*.tar.gz
            ${{ steps.package.outputs.output_dir }}/*.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  xmake-build:
    name: xmake / clang
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UEPSEUDO_PAT || github.token }}

      - name: Apply downstream UEPseudo patches
        run: ./tools/ci/apply-uepseudo-patches.sh

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-20 lld-20 llvm-20 cmake ninja-build

      - name: Put Clang 20 first in PATH
        run: |
          toolchain_dir="${RUNNER_TEMP}/clang-20-bin"

          mkdir -p "${toolchain_dir}"

          ln -sf "$(command -v clang-20)"             "${toolchain_dir}/clang"

          ln -sf "$(command -v clang++-20)"             "${toolchain_dir}/clang++"

          ln -sf "$(command -v clang-20)"             "${toolchain_dir}/cc"

          ln -sf "$(command -v clang++-20)"             "${toolchain_dir}/c++"

          ln -sf "$(command -v llvm-ar-20)"             "${toolchain_dir}/ar"

          printf '%s\n' "${toolchain_dir}" >> "${GITHUB_PATH}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: '2.9.3'

      - name: Diagnose C++23 toolchain
        run: |
          set -euxo pipefail

          command -v clang
          readlink -f "$(command -v clang)"
          clang --version
          command -v clang++
          readlink -f "$(command -v clang++)"
          clang++ --version
          cmake --version
          xmake --version

          cat > /tmp/std-expected.cpp <<'EOF'
          #include <expected>

          int main()
          {
              std::expected<int, int> result{42};
              return result.value() == 42 ? 0 : 1;
          }
          EOF

          clang++ -std=c++23 /tmp/std-expected.cpp -o /tmp/std-expected

          /tmp/std-expected

      - name: Configure
        env:
          CC: clang
          CXX: clang++
          AR: /usr/bin/llvm-ar-20
        run: |
          xmake f -p linux -a x86_64 -m Game__Shipping__Linux --cc=clang --cxx=clang++ --ld=clang++ --sh=clang++ --ar=/usr/bin/llvm-ar-20 -y -vD

      - name: Dump xmake package failure logs
        if: ${{ failure() }}
        run: |
          set -o pipefail

          echo '=== Failed xmake package logs ==='

          found=0

          while IFS= read -r -d '' logfile; do
            found=1
            echo
            echo "===== ${logfile} ====="
            sed -n '1,500p' "${logfile}"
          done < <(
            find "${HOME}/.xmake"               -type f               -path '*/installdir.failed/logs/*'               -print0 2>/dev/null
          )

          if [[ "${found}" -eq 0 ]]; then
            echo 'No failed package logs found.'
          fi

      - name: Build UE4SS
        run: xmake build -j 2 -y UE4SS

      - name: Check unresolved dynamic symbols
        run: |
          output="$(ldd -r Binaries/Game__Shipping__Linux/UE4SS/libUE4SS.so 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'undefined symbol' <<<"$output"; then
            exit 1
          fi
