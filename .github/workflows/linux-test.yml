name: Native Linux

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-tests:
    name: CMake / clang / ctest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UEPSEUDO_PAT || github.token }}

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-20 lld-20 llvm-20 ninja-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: |
          cmake -S . -B build_linux_ci -G Ninja \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_BUILD_TYPE=Game__Shipping__Linux \
            -DUE4SS_GUI=OFF \
            -DUE4SS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build_linux_ci --parallel 2

      - name: Check unresolved dynamic symbols
        run: |
          output="$(ldd -r build_linux_ci/Game__Shipping__Linux/lib/libUE4SS.so 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'undefined symbol' <<<"$output"; then
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build_linux_ci --output-on-failure

  xmake-build:
    name: xmake / clang
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UEPSEUDO_PAT || github.token }}

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-20 lld-20 llvm-20 cmake ninja-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: '2.9.3'

      - name: Diagnose C++23 toolchain
        run: |
          set -euxo pipefail

          clang-20 --version
          clang++-20 --version
          cmake --version
          xmake --version

          cat > /tmp/std-expected.cpp <<'EOF'
          #include <expected>

          int main()
          {
              std::expected<int, int> result{42};
              return result.value() == 42 ? 0 : 1;
          }
          EOF

          clang++-20 -std=c++23 /tmp/std-expected.cpp -o /tmp/std-expected

          /tmp/std-expected

      - name: Configure
        run: |
          xmake f -p linux -a x86_64 -m Game__Shipping__Linux --cc=clang-20 --cxx=clang++-20 --ld=clang++-20 --sh=clang++-20 --ar=llvm-ar-20 -y -vD

      - name: Dump xmake package failure logs
        if: ${{ failure() }}
        run: |
          set -o pipefail

          echo '=== Failed xmake package logs ==='

          found=0

          while IFS= read -r -d '' logfile; do
            found=1
            echo
            echo "===== ${logfile} ====="
            sed -n '1,500p' "${logfile}"
          done < <(
            find "${HOME}/.xmake"               -type f               -path '*/installdir.failed/logs/*'               -print0 2>/dev/null
          )

          if [[ "${found}" -eq 0 ]]; then
            echo 'No failed package logs found.'
          fi

      - name: Build UE4SS
        run: xmake build -j 2 -y UE4SS

      - name: Check unresolved dynamic symbols
        run: |
          output="$(ldd -r Binaries/Game__Shipping__Linux/UE4SS/libUE4SS.so 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'undefined symbol' <<<"$output"; then
            exit 1
          fi
